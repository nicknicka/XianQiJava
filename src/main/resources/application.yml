server:
  port: 8080
  servlet:
    context-path: /api
    encoding:
      charset: UTF-8
      enabled: true
      force: true

spring:
  application:
    name: XianQiJava

  # 数据源配置
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://localhost:3306/XianQi?useUnicode=true&characterEncoding=UTF-8&useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true&connectionCollation=utf8mb4_unicode_ci
    username: root
    password: 123456
    hikari:
      minimum-idle: 5
      maximum-pool-size: 20
      connection-timeout: 30000
      idle-timeout: 600000
      max-lifetime: 1800000
      connection-init-sql: SET NAMES utf8mb4
      connection-test-query: SELECT 1

  # Redis 配置
  data:
    redis:
      host: localhost
      port: 6379
      password:
      database: 0
      timeout: 5000ms
      lettuce:
        pool:
          min-idle: 0
          max-idle: 8
          max-active: 8
          max-wait: -1ms
  # 禁用 Redis（如不需要缓存功能，取消下面注释）
  # autoconfigure:
  #   exclude:
  #     - org.springframework.boot.autoconfigure.data.redis.RedisAutoConfiguration

  # Jackson 配置
  jackson:
    date-format: yyyy-MM-dd HH:mm:ss
    time-zone: GMT+8
    default-property-inclusion: non_null

  # 文件上传配置
  servlet:
    multipart:
      enabled: true
      max-file-size: 5MB
      max-request-size: 20MB
      file-size-threshold: 0

# MyBatis-Plus 配置
mybatis-plus:
  mapper-locations: classpath*:mapper/**/*Mapper.xml
  type-aliases-package: com.xx.xianqijava.entity
  configuration:
    map-underscore-to-camel-case: true
    cache-enabled: false
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl  # 启用 SQL 日志用于调试
  global-config:
    db-config:
      id-type: auto
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0

# Knife4j API 文档配置
knife4j:
  enable: true
  setting:
    language: zh_cn
    swagger-model-name: 实体类列表
  production: false
  basic:
    enable: false

# Swagger 配置
springdoc:
  api-docs:
    enabled: true
    path: /v3/api-docs
  swagger-ui:
    enabled: true
    path: /swagger-ui.html
  group-configs:
    - group: default
      paths-to-match: /**
      packages-to-scan: com.xx.xianqijava.controller

# JWT 配置
jwt:
  secret: XianQiJavaSecretKey2026CampusTradePlatformSecretKeyMustBeLongEnough
  expiration: 86400000  # 24小时，单位毫秒
  refresh-expiration: 604800000  # 7天，单位毫秒
  admin-expiration: 86400  # 24小时，单位秒（管理员Token）
  header: Authorization
  token-prefix: Bearer

# 阿里云 OSS 配置
aliyun:
  oss:
    enabled: false
    endpoint: oss-cn-guangzhou.aliyuncs.com
    access-key-id: your-access-key-id
    access-key-secret: your-access-key-secret
    bucket-name: campus-trade
    base-url: https://campage-trade.oss-cn-guangzhou.aliyuncs.com

# 业务配置
business:
  # 文件上传配置
  upload:
    max-size: 5242880  # 5MB
    allowed-types: jpg,jpeg,png,webp,gif
    max-count: 9
    local-path: /tmp/xianqi-uploads

  # 商品配置
  product:
    max-images: 9
    title-max-length: 50
    desc-max-length: 2000

  # 订单配置
  order:
    auto-close-time: 1800  # 30分钟
    auto-finish-time: 604800  # 7天

  # 共享物品配置
  share:
    max-days: 30

  # 信用配置
  credit:
    initial-score: 100

# 日志配置
logging:
  level:
    com.xx.xianqijava: info  # 改为 info，隐藏所有 DEBUG 日志
    com.baomidou.mybatisplus: info
    com.xx.xianqijava.websocket: info
  pattern:
    console: '%d{yyyy-MM-dd HH:mm:ss.SSS} [%thread] %-5level %logger{50} - %msg%n'
  file:
    name: logs/xianqi-java.log
    max-size: 10MB
    max-history: 30

# 文件上传配置
file:
  upload:
    path: ../uploads  # 本地存储路径（项目父目录下的 uploads 文件夹）
    url-prefix: /uploads  # URL前缀
    max-size: 5242880  # 最大文件大小（5MB）

# 应用配置
app:
  base-url: http://localhost:8080  # 应用基础URL（开发环境）
  image-url-prefix: /api/image  # 图片访问URL前缀（包含/api前缀）

# 短信服务配置
sms:
  enabled: true              # 是否启用短信服务
  mock-mode: true            # 模拟模式（开发环境使用true，生产环境使用false）
  # 阿里云短信配置（生产环境）
  aliyun:
    access-key-id: ${ALIYUN_ACCESS_KEY_ID:your-access-key-id}
    access-key-secret: ${ALIYUN_ACCESS_KEY_SECRET:your-access-key-secret}
    sign-name: 校园二手交易
    template-register: SMS_TEMPLATE_REGISTER  # 注册验证码模板
    template-login: SMS_TEMPLATE_LOGIN      # 登录验证码模板
    template-reset: SMS_TEMPLATE_RESET      # 重置密码模板

# 支付服务配置
payment:
  enabled: true              # 是否启用支付服务
  mock-mode: true            # 模拟模式（开发环境使用true，生产环境使用false）
  # 支付宝配置（生产环境）
  alipay:
    app-id: ${ALIPAY_APP_ID:}
    private-key: ${ALIPAY_PRIVATE_KEY:}
    public-key: ${ALIPAY_PUBLIC_KEY:}
    gateway-url: https://openapi.alipay.com/gateway.do  # 正式环境
    # gateway-url: https://openapi.alipaydev.com/gateway.do  # 沙箱环境

# 推荐系统配置
recommendation:
  # 缓存配置
  cache-enabled: true
  cache-expire-seconds: 300  # 5分钟

  # 推荐权重配置
  weight:
    history-weight: 0.4        # 浏览历史推荐权重
    favorite-weight: 0.3      # 收藏推荐权重
    collaborative-weight: 0.2  # 协同过滤推荐权重
    hot-weight: 0.1           # 热门商品权重
    geo-weight: 0.15          # 地理位置推荐权重

  # 地理位置推荐配置
  geo:
    enabled: true             # 是否启用地理位置推荐
    nearby-radius-km: 3.0     # 附近商品距离范围（公里）
    distance-decay-factor: 0.5 # 距离衰减因子

  # 多样性配置
  diversity:
    enabled: true             # 是否启用多样性推荐
    max-category-ratio: 0.6   # 同一分类商品最大占比
    freshness-factor: 0.2     # 新鲜度因子

# 智谱 AI 配置
zhipuai:
  api-key: 3d3a55af11d54b239be9b17ed9d0bef8.B52KI6KVyBMqrITz                  # 从环境变量读取 API Key
  model: glm-4-flash                              # 使用的模型（免费版）
  vision-model: glm-4.6v-flash                    # 视觉识别模型
  timeout: 60000                                  # 请求超时时间（毫秒）
  base-url: https://open.bigmodel.cn/api/paas/v4/chat/completions

# AI 功能配置
ai:
  enabled: true                                    # 是否启用 AI 功能
  max-tokens: 2000                                # 最大回复长度
  temperature: 0.7                                # 温度参数（0-1，越高越随机）
  chat-memory-size: 20                            # 对话记忆大小（消息数量）
  stream-enabled: false                           # 是否启用流式输出（打字机效果）
